name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # --ignore-scripts skips native builds of transitive n8n deps
      # (e.g. isolated-vm). We only need n8n-workflow for type-checking.
      # --legacy-peer-deps: @n8n/node-cli@0.23 peer-demands eslint >= 9, but
      # eslint-plugin-n8n-nodes-base still tracks the eslint 8 line.
      - run: npm ci --ignore-scripts --legacy-peer-deps

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Verify package can be packed
        run: npm pack --dry-run
