name: Release

# Fires on a version tag (v0.1.0, v0.2.3, ...). Tag the commit you want to ship:
#   git tag v0.1.0 && git push --tags
# The tag version must match package.json's "version" or npm publish will fail.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release
      id-token: write   # for npm provenance

    steps:
      - uses: actions/checkout@v4

      # Node 24 ships with npm 11.x, required for Trusted Publishing (OIDC).
      # Do NOT pass `registry-url` here: setup-node would write an .npmrc
      # with `_authToken=${NODE_AUTH_TOKEN}`, which makes npm prefer empty
      # token auth over OIDC and 404 on publish. Without that .npmrc, npm
      # falls through to Trusted Publishing cleanly.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci --ignore-scripts

      - run: npm run lint

      - run: npm run build

      - name: Check tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Uses npm Trusted Publishing (OIDC) - no NPM_TOKEN needed.
      # Requires a Trusted Publisher configured on npmjs.com pointing at
      # this repo + workflow + job name. See release-checklist in README.
      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tgz
