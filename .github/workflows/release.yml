name: Release

# Fires on a version tag (v0.1.0, v0.2.3, ...). Tag the commit you want to ship:
#   git tag v0.1.0 && git push --tags
# The tag version must match package.json's "version" or npm publish will fail.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release
      id-token: write   # for OIDC (npm Trusted Publishing + Sigstore provenance)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # setup-node writes an .npmrc at $NPM_CONFIG_USERCONFIG (NOT ~/.npmrc!)
      # with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`. When
      # NODE_AUTH_TOKEN is unset, that line makes npm publish use an empty
      # token instead of falling through to Trusted Publishing / OIDC. Strip
      # it so npm 11+ sees "no configured auth" and triggers the OIDC exchange.
      - name: Strip _authToken line from setup-node's .npmrc
        run: |
          NPMRC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$NPMRC" ]; then
            echo "--- $NPMRC before ---"
            cat "$NPMRC"
            grep -v '_authToken' "$NPMRC" > "$NPMRC.clean" || true
            mv "$NPMRC.clean" "$NPMRC"
            echo "--- $NPMRC after ---"
            cat "$NPMRC"
          else
            echo "No .npmrc at $NPMRC"
          fi

      - run: npm ci --ignore-scripts

      - run: npm run lint

      - run: npm run build

      - name: Check tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # One-time diagnostic so if this STILL 404s we can see exactly what npm
      # is doing and what OIDC claims GitHub is minting. Delete this step once
      # publishing works.
      - name: Debug OIDC / npm state
        run: |
          echo "--- OIDC env vars present? ---"
          env | grep -E '^(ACTIONS_ID_TOKEN|GITHUB_)' | sort
          echo ""
          echo "--- npm config (publish-relevant) ---"
          npm config get registry
          npm config get //registry.npmjs.org/:_authToken || echo "(no _authToken - good)"
          echo ""
          echo "--- OIDC token claims for audience npm:registry.npmjs.org ---"
          TOKEN=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | node -e 'let d=""; process.stdin.on("data",c=>d+=c).on("end",()=>console.log(JSON.parse(d).value))')
          if [ -n "$TOKEN" ]; then
            echo "$TOKEN" | cut -d'.' -f2 | tr '_-' '/+' | base64 -d 2>/dev/null | node -e 'let d=""; process.stdin.on("data",c=>d+=c).on("end",()=>console.log(JSON.stringify(JSON.parse(d),null,2)))'
          else
            echo "Failed to mint OIDC token"
          fi

      - name: Publish to npm via Trusted Publishing (OIDC)
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tgz
