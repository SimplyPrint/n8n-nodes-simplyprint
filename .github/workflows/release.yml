name: Release

# Fires on a version tag (v0.1.0, v0.2.3, ...). Tag the commit you want to ship:
#   git tag v0.1.0 && git push --tags
# The tag version must match package.json's "version" or npm publish will fail.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release
      id-token: write   # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci --ignore-scripts

      - run: npm run lint

      - run: npm run build

      - name: Check tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # Classic npm token auth. Trusted Publishing / OIDC did not fire
      # reliably on this runner setup (npm 11 kept falling back to empty-
      # token auth); switched to NPM_TOKEN as a pragmatic fallback.
      # NPM_TOKEN is a Granular Access Token scoped to
      # @simplyprint/n8n-nodes-simplyprint with Write access.
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tgz
