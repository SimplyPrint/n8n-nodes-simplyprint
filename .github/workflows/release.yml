name: Release

# Fires on a version tag (v0.1.0, v0.2.3, ...). Tag the commit you want to ship:
#   git tag v0.1.0 && git push --tags
# The tag version must match package.json's "version" or npm publish will fail.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm
    
    permissions:
      contents: write   # needed by softprops/action-gh-release to create the release
      id-token: write   # for npm Trusted Publishing (OIDC)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # --legacy-peer-deps: @n8n/node-cli@0.23 peer-demands eslint >= 9
        # while eslint-plugin-n8n-nodes-base is still on the eslint 8 line.
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Produces the .tgz on disk so the GitHub Release step can attach it.
      # `npm publish` alone uploads to the registry but doesn't leave a tarball.
      - name: Pack tarball
        run: npm pack

      # Prerelease versions (0.4.0-beta.1, 1.0.0-rc.2, ...) publish under the
      # `beta` dist-tag so `npm install <pkg>` still serves the last stable.
      - name: Determine dist-tag
        id: distTag
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if [[ "$version" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        run: npm publish --access public --provenance --tag ${{ steps.distTag.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.distTag.outputs.prerelease == 'true' }}
          files: |
            *.tgz
